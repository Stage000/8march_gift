
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для моей любимой ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
color:black;
text-align:center;
}

.page{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
pointer-events:none;
transition:opacity 1s;
}

.page.active{
opacity:1;
pointer-events:auto;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4d6d,#ff758f);
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:transform .2s;
}

button:hover{ transform:scale(1.1); }

.gallery{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.gallery img{
width:220px;
border-radius:15px;
transition:transform .4s;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.gallery img:hover{
transform:scale(1.1) rotate(2deg);
}

#gameArea{
position:relative;
width:80%;
height:60vh;
}

.heart{
position:absolute;
font-size:30px;
cursor:pointer;
}

#letter{
font-family:'Caveat',cursive;
font-size:32px;
width:70%;
line-height:1.6;
white-space:pre-line;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

</style>
</head>

<body>

<div class="page active" id="page1">
<h1>💐 С 8 Марта!</h1>
<p>У меня есть маленький сюрприз для тебя ❤️</p>
<button onclick="nextPage(2)">Начать</button>
</div>

<div class="page" id="page2">
<h1>Поймай сердечки 💖</h1>
<p>Нужно поймать 10</p>
<div id="gameArea"></div>
<p id="score">0 / 10</p>
</div>

<div class="page" id="page3">
<h1>Наши моменты 📸</h1>
<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
</div>
<br>
<button onclick="nextPage(4)">Дальше</button>
</div>

<div class="page" id="page4">
<h1>У меня есть письмо для тебя 💌</h1>
<button onclick="openLetter()">Открыть письмо</button>
</div>

<div class="page" id="page5">
<h1>Письмо для тебя</h1>
<div id="letter"></div>
</div>

<script>

function nextPage(num){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("page"+num).classList.add("active");
}

/* лепестки */

function createPetal(){
const petal=document.createElement("div");
petal.innerHTML="🌸";
petal.style.position="fixed";
petal.style.left=Math.random()*100+"vw";
petal.style.top="-20px";
petal.style.fontSize=(10+Math.random()*20)+"px";
petal.style.animation=`fall ${5+Math.random()*5}s linear`;
document.body.appendChild(petal);
setTimeout(()=>petal.remove(),10000);
}

setInterval(createPetal,200);

/* игра */

let score=0;

function spawnHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*90+"%";
heart.style.top=Math.random()*80+"%";
heart.onclick=()=>{
score++;
heart.remove();
document.getElementById("score").innerText=score+" / 10";
if(score>=10){ nextPage(3); }
}
document.getElementById("gameArea").appendChild(heart);
setTimeout(()=>heart.remove(),2000);
}

setInterval(spawnHeart,800);

/* письмо */

const text=`Моя любимая,

С 8 Марта тебя ❤️

Ты самое прекрасное, что произошло в моей жизни.
Каждый день рядом с тобой делает меня счастливее.

Спасибо за твою улыбку,
за твоё тепло,
за твою любовь.

Я очень тебя люблю.`;

let i=0;

function openLetter(){
nextPage(5);
let interval=setInterval(()=>{
document.getElementById("letter").textContent+=text[i];
i++;
if(i>=text.length) clearInterval(interval);
},40);
}

</script>

</body>
</html>
